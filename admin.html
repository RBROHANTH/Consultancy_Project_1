<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFC Admin — Enquiry Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg:        #0b0f1a;
            --surface:   #111827;
            --border:    #1e2d40;
            --accent:    #f77f00;
            --accent2:   #4cc9f0;
            --text:      #e2e8f0;
            --muted:     #64748b;
            --success:   #22c55e;
            --danger:    #ef4444;
            --contact-badge: #3b82f6;
            --dealer-badge:  #f77f00;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

        /* ── Login screen ── */
        #loginScreen {
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            background: radial-gradient(ellipse at 30% 40%, rgba(247,127,0,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 70%, rgba(76,201,240,0.06) 0%, transparent 60%),
                        var(--bg);
        }
        .login-card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:20px;
            padding:48px 40px;
            width:100%; max-width:420px;
            box-shadow:0 25px 60px rgba(0,0,0,0.5);
        }
        .login-logo { font-size:1.6rem; font-weight:700; color:#fff; margin-bottom:6px; }
        .login-logo span { color:var(--accent); }
        .login-sub { color:var(--muted); font-size:0.85rem; margin-bottom:32px; }
        .login-label { font-size:0.78rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; display:block; }
        .login-input {
            width:100%; background:#0d1421; border:1px solid var(--border);
            border-radius:10px; padding:13px 16px; color:var(--text);
            font-family:'DM Mono',monospace; font-size:0.95rem; outline:none;
            transition:border-color 0.2s;
        }
        .login-input:focus { border-color:var(--accent); }
        .login-btn {
            width:100%; margin-top:20px; padding:14px;
            background:var(--accent); border:none; border-radius:10px;
            color:#fff; font-weight:700; font-size:0.95rem; cursor:pointer;
            transition:all 0.2s; font-family:'DM Sans',sans-serif;
        }
        .login-btn:hover { background:#e06e00; transform:translateY(-1px); }
        .login-error { color:var(--danger); font-size:0.82rem; margin-top:10px; display:none; }

        /* ── Dashboard layout ── */
        #dashboard { display:none; }

        .topbar {
            background:var(--surface); border-bottom:1px solid var(--border);
            padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
            position:sticky; top:0; z-index:100;
        }
        .topbar-brand { font-weight:700; font-size:1.1rem; }
        .topbar-brand span { color:var(--accent); }
        .topbar-right { display:flex; align-items:center; gap:16px; }
        .logout-btn {
            background:transparent; border:1px solid var(--border);
            color:var(--muted); padding:7px 16px; border-radius:8px;
            cursor:pointer; font-size:0.82rem; font-family:'DM Sans',sans-serif;
            transition:all 0.2s;
        }
        .logout-btn:hover { border-color:var(--danger); color:var(--danger); }

        .main { padding:28px; max-width:1400px; margin:0 auto; }

        /* ── Stat cards ── */
        .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
        @media(max-width:900px){ .stats-row{ grid-template-columns:repeat(2,1fr); } }
        .stat-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:16px; padding:22px 24px; position:relative; overflow:hidden;
            transition:transform 0.2s;
        }
        .stat-card:hover { transform:translateY(-2px); }
        .stat-card::before {
            content:''; position:absolute; top:-20px; right:-20px;
            width:80px; height:80px; border-radius:50%;
            background:var(--card-glow,rgba(247,127,0,0.08));
        }
        .stat-card .stat-label { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:8px; }
        .stat-card .stat-value { font-size:2.2rem; font-weight:700; color:var(--card-color,var(--accent)); font-family:'DM Mono',monospace; line-height:1; }
        .stat-card .stat-sub { font-size:0.78rem; color:var(--muted); margin-top:6px; }

        /* ── Controls bar ── */
        .controls {
            display:flex; gap:12px; flex-wrap:wrap; align-items:center;
            margin-bottom:20px;
        }
        .search-wrap { position:relative; flex:1; min-width:200px; }
        .search-wrap i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:0.9rem; }
        .search-input {
            width:100%; background:var(--surface); border:1px solid var(--border);
            border-radius:10px; padding:10px 14px 10px 36px; color:var(--text);
            font-family:'DM Sans',sans-serif; font-size:0.88rem; outline:none;
            transition:border-color 0.2s;
        }
        .search-input:focus { border-color:var(--accent); }
        .filter-btn {
            padding:10px 18px; border-radius:10px; border:1px solid var(--border);
            background:var(--surface); color:var(--muted); cursor:pointer;
            font-size:0.82rem; font-family:'DM Sans',sans-serif; transition:all 0.2s;
        }
        .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
        .filter-btn:hover:not(.active) { border-color:var(--accent); color:var(--text); }
        .refresh-btn {
            padding:10px 16px; border-radius:10px; border:1px solid var(--border);
            background:var(--surface); color:var(--muted); cursor:pointer;
            font-size:0.88rem; font-family:'DM Sans',sans-serif; transition:all 0.2s;
            display:flex; align-items:center; gap:6px;
        }
        .refresh-btn:hover { border-color:var(--accent2); color:var(--accent2); }
        .refresh-btn.spinning i { animation:spin 0.6s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── Table ── */
        .table-wrap {
            background:var(--surface); border:1px solid var(--border);
            border-radius:16px; overflow:hidden;
        }
        table { width:100%; border-collapse:collapse; }
        thead tr { background:#0d1421; }
        thead th {
            padding:13px 16px; text-align:left; font-size:0.72rem;
            text-transform:uppercase; letter-spacing:0.08em; color:var(--muted);
            font-weight:600; white-space:nowrap;
        }
        tbody tr { border-top:1px solid var(--border); transition:background 0.15s; cursor:pointer; }
        tbody tr:hover { background:rgba(247,127,0,0.04); }
        td { padding:13px 16px; font-size:0.85rem; vertical-align:top; }
        td.mono { font-family:'DM Mono',monospace; font-size:0.78rem; color:var(--muted); }

        .badge {
            display:inline-block; padding:3px 10px; border-radius:20px;
            font-size:0.72rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase;
        }
        .badge-contact { background:rgba(59,130,246,0.15); color:#93c5fd; }
        .badge-dealer  { background:rgba(247,127,0,0.15);  color:#f97316; }

        .td-name { font-weight:600; color:#fff; }
        .td-email { color:var(--accent2); font-size:0.8rem; }
        .td-preview { color:var(--muted); font-size:0.82rem; max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

        .no-data { padding:60px 24px; text-align:center; color:var(--muted); }
        .no-data i { font-size:2.5rem; display:block; margin-bottom:12px; }

        /* ── Detail modal ── */
        .modal-bg {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
            z-index:1000; align-items:center; justify-content:center; padding:20px;
        }
        .modal-bg.open { display:flex; }
        .modal {
            background:var(--surface); border:1px solid var(--border);
            border-radius:20px; width:100%; max-width:580px; max-height:90vh;
            overflow-y:auto; padding:32px; position:relative;
            animation:slideUp 0.25s ease;
        }
        @keyframes slideUp { from { transform:translateY(20px); opacity:0; } }
        .modal-close {
            position:absolute; top:16px; right:16px;
            background:var(--border); border:none; border-radius:8px;
            color:var(--text); width:32px; height:32px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            font-size:0.9rem; transition:background 0.2s;
        }
        .modal-close:hover { background:var(--danger); }
        .modal h3 { font-size:1.1rem; margin-bottom:4px; }
        .modal .modal-id { font-family:'DM Mono',monospace; font-size:0.75rem; color:var(--muted); margin-bottom:20px; }
        .detail-row { display:grid; grid-template-columns:140px 1fr; gap:8px; margin-bottom:12px; font-size:0.88rem; }
        .detail-label { color:var(--muted); font-weight:600; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.05em; padding-top:2px; }
        .detail-value { color:var(--text); word-break:break-word; }
        .detail-message {
            background:#0d1421; border:1px solid var(--border); border-radius:10px;
            padding:16px; font-size:0.85rem; line-height:1.7; color:var(--text);
            white-space:pre-wrap; margin-top:4px;
        }

        /* ── Toast ── */
        #toast {
            position:fixed; bottom:24px; right:24px; z-index:9999;
            background:#1e293b; border:1px solid var(--border);
            border-radius:12px; padding:14px 20px; font-size:0.85rem;
            display:none; animation:fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(10px); } }


        .action-bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
        .csv-btn {
            padding:9px 18px; border-radius:10px; border:1px solid #22c55e;
            background:transparent; color:#22c55e; cursor:pointer;
            font-size:0.82rem; font-family:'DM Sans',sans-serif; transition:all 0.2s;
            display:flex; align-items:center; gap:6px;
        }
        .csv-btn:hover { background:#22c55e; color:#0b0f1a; }
        .del-all-btn {
            padding:9px 18px; border-radius:10px; border:1px solid var(--danger);
            background:transparent; color:var(--danger); cursor:pointer;
            font-size:0.82rem; font-family:'DM Sans',sans-serif; transition:all 0.2s;
            display:flex; align-items:center; gap:6px; margin-left:auto;
        }
        .del-all-btn:hover { background:var(--danger); color:#fff; }
        .row-unread { background: rgba(247,127,0,0.05) !important; }
        .row-unread td:first-child { border-left: 3px solid var(--accent); }
        .unread-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--accent); margin-right:6px; vertical-align:middle; }
        .td-actions { display:flex; gap:8px; }
        .btn-read, .btn-del {
            background:transparent; border:1px solid var(--border);
            border-radius:6px; padding:4px 10px; cursor:pointer;
            font-size:0.72rem; font-family:'DM Sans',sans-serif; transition:all 0.2s;
        }
        .btn-read { color:var(--accent2); border-color:var(--accent2); }
        .btn-read:hover { background:var(--accent2); color:#0b0f1a; }
        .btn-del  { color:var(--danger);  border-color:var(--danger); }
        .btn-del:hover  { background:var(--danger);  color:#fff; }
        .unread-count-badge {
            display:inline-flex; align-items:center; justify-content:center;
            background:var(--accent); color:#fff; border-radius:20px;
            font-size:0.7rem; font-weight:700; padding:2px 8px; margin-left:8px;
        }
        .result-count { font-size:0.82rem; color:var(--muted); padding:12px 16px; border-top:1px solid var(--border); }
    </style>
</head>
<body>

<!-- ── LOGIN SCREEN ─────────────────────────────────────────────────────────── -->
<div id="loginScreen">
    <div class="login-card">
        <div class="login-logo">VFC <span>Admin</span></div>
        <div class="login-sub">Enquiry Dashboard &mdash; Authorized Access Only</div>
        <label class="login-label" for="pwdInput">Admin Password</label>
        <input class="login-input" id="pwdInput" type="password" placeholder="Enter password…" autocomplete="current-password">
        <div class="login-error" id="loginError"><i class="bi bi-shield-x"></i> Incorrect password. Try again.</div>
        <button class="login-btn" id="loginBtn">Unlock Dashboard &nbsp;→</button>
    </div>
</div>

<!-- ── DASHBOARD ─────────────────────────────────────────────────────────────── -->
<div id="dashboard">
    <div class="topbar">
        <div class="topbar-brand">VFC <span>Admin</span> &nbsp;<span style="color:var(--muted);font-weight:400;font-size:0.85rem;">/ Enquiries</span></div>
        <div class="topbar-right">
            <span id="topbarTime" style="font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--muted);"></span>
            <button class="logout-btn" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </div>
    </div>

    <div class="main">
        <!-- Stats -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card" style="--card-color:#f97316;--card-glow:rgba(249,115,22,0.1);">
                <div class="stat-label">Total Enquiries</div>
                <div class="stat-value" id="sTotal">—</div>
                <div class="stat-sub">all time</div>
            </div>
            <div class="stat-card" style="--card-color:#3b82f6;--card-glow:rgba(59,130,246,0.1);">
                <div class="stat-label">Contact Forms</div>
                <div class="stat-value" id="sContact">—</div>
                <div class="stat-sub">general enquiries</div>
            </div>
            <div class="stat-card" style="--card-color:#f77f00;--card-glow:rgba(247,127,0,0.1);">
                <div class="stat-label">Dealer Enquiries</div>
                <div class="stat-value" id="sDealer">—</div>
                <div class="stat-sub">bulk / distributor</div>
            </div>
            <div class="stat-card" style="--card-color:#22c55e;--card-glow:rgba(34,197,94,0.1);">
                <div class="stat-label">Today</div>
                <div class="stat-value" id="sToday">—</div>
                <div class="stat-sub">new submissions</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="search-wrap">
                <i class="bi bi-search"></i>
                <input class="search-input" id="searchInput" type="text" placeholder="Search by name, email, city, message…">
            </div>
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="contact">Contact</button>
            <button class="filter-btn" data-filter="dealer">Dealer</button>
            <button class="refresh-btn" id="refreshBtn"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
        </div>

        <!-- Action Bar -->
        <div class="action-bar">
            <button class="csv-btn" id="csvBtn"><i class="bi bi-download"></i> Export CSV</button>
            <span id="unreadBadge"></span>
            <button class="del-all-btn" id="delAllBtn"><i class="bi bi-trash3"></i> Clear All</button>
        </div>

                <!-- Table -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>ID</th>
                        <th>From</th>
                        <th>Subject / Business</th>
                        <th>Preview</th>
                        <th>Date & Time</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="result-count" id="resultCount"></div>
        </div>
    </div>
</div>

<!-- ── DETAIL MODAL ───────────────────────────────────────────────────────────── -->
<div class="modal-bg" id="modalBg">
    <div class="modal" id="modalBox">
        <button class="modal-close" id="modalClose"><i class="bi bi-x"></i></button>
        <div id="modalContent"></div>
    </div>
</div>

<!-- ── TOAST ─────────────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
    let adminPassword = '';
    let allEnquiries  = [];
    let activeFilter  = 'all';

    // ── Login ──────────────────────────────────────────────────────────────────
    async function tryLogin() {
        const pwd = document.getElementById('pwdInput').value.trim();
        if (!pwd) return;

        const res  = await fetch(`/admin/enquiries?limit=1`, {
            headers: { 'x-admin-password': pwd }
        });

        if (res.ok) {
            adminPassword = pwd;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display   = 'block';
            loadEnquiries();
            startClock();
        } else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('pwdInput').focus();
        }
    }

    document.getElementById('loginBtn').addEventListener('click', tryLogin);
    document.getElementById('pwdInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
    document.getElementById('logoutBtn').addEventListener('click', () => location.reload());

    // ── Clock ──────────────────────────────────────────────────────────────────
    function startClock() {
        function tick() {
            document.getElementById('topbarTime').textContent =
                new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        }
        tick(); setInterval(tick, 1000);
    }

    // ── Load data ──────────────────────────────────────────────────────────────
    async function loadEnquiries() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('spinning');

        try {
            const res  = await fetch('/admin/enquiries', { headers: { 'x-admin-password': adminPassword } });
            const data = await res.json();
            allEnquiries = data.enquiries || [];
            updateStats();
            renderTable();
            showToast(`✓ Loaded ${allEnquiries.length} enquiries`);
        } catch {
            showToast('✗ Failed to load enquiries', true);
        } finally {
            btn.classList.remove('spinning');
        }
    }

    // ── Stats ──────────────────────────────────────────────────────────────────
    function updateStats() {
        const today  = new Date().toISOString().slice(0, 10);
        const todayN = allEnquiries.filter(e => e.timestamp?.startsWith(today)).length;
        document.getElementById('sTotal').textContent   = allEnquiries.length;
        document.getElementById('sContact').textContent = allEnquiries.filter(e => e.type === 'contact').length;
        document.getElementById('sDealer').textContent  = allEnquiries.filter(e => e.type === 'dealer').length;
        document.getElementById('sToday').textContent   = todayN;
    }

    // ── Render table ───────────────────────────────────────────────────────────
    // Track read state locally (persisted in sessionStorage)
    function getReadSet() {
        try { return new Set(JSON.parse(sessionStorage.getItem('readIds') || '[]')); } catch { return new Set(); }
    }
    function markRead(id) {
        const s = getReadSet(); s.add(id);
        sessionStorage.setItem('readIds', JSON.stringify([...s]));
    }
    function updateUnreadBadge() {
        const read    = getReadSet();
        const unread  = allEnquiries.filter(e => !read.has(e.id)).length;
        const badge   = document.getElementById('unreadBadge');
        badge.innerHTML = unread > 0
            ? `<span class="unread-count-badge">${unread} unread</span>`
            : '';
    }

    function renderTable() {
        const q      = document.getElementById('searchInput').value.toLowerCase();
        const tbody  = document.getElementById('tableBody');
        const read   = getReadSet();

        let rows = allEnquiries;
        if (activeFilter !== 'all') rows = rows.filter(e => e.type === activeFilter);
        if (q) rows = rows.filter(e => JSON.stringify(e).toLowerCase().includes(q));

        document.getElementById('resultCount').textContent =
            `Showing ${rows.length} of ${allEnquiries.length} enquiries`;

        updateUnreadBadge();

        if (!rows.length) {
            tbody.innerHTML = `<tr><td colspan="7"><div class="no-data">
                <i class="bi bi-inbox"></i>No enquiries found.</div></td></tr>`;
            return;
        }

        tbody.innerHTML = rows.map(e => {
            const isDealer  = e.type === 'dealer';
            const isUnread  = !read.has(e.id);
            const name      = isDealer ? e.business_name  : e.from_name;
            const email     = isDealer ? (e.email || e.phone) : e.from_email;
            const subject   = isDealer ? `${e.city} — ${e.order_quantity}` : (e.subject || '—');
            const preview   = isDealer ? (e.flavors || e.message || '—') : (e.message || '—');
            const dt        = e.timestamp ? new Date(e.timestamp).toLocaleString('en-IN', { timeZone:'Asia/Kolkata', day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
            const eJson     = JSON.stringify(e).replace(/"/g, '&quot;');

            return `<tr class="${isUnread ? 'row-unread' : ''}" onclick="openModalAndMark('${e.id}', ${eJson})">
                <td><span class="badge badge-${e.type}">${e.type}</span>${isUnread ? '<span class="unread-dot"></span>' : ''}</td>
                <td class="mono">${e.id || '—'}</td>
                <td><div class="td-name">${name || '—'}</div><div class="td-email">${email || ''}</div></td>
                <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${subject}</td>
                <td><div class="td-preview">${preview}</div></td>
                <td class="mono" style="white-space:nowrap;">${dt}</td>
                <td onclick="event.stopPropagation()">
                    <div class="td-actions">
                        ${isUnread ? `<button class="btn-read" onclick="markReadRow('${e.id}')">Read</button>` : ''}
                        <button class="btn-del" onclick="deleteRow('${e.id}')">Del</button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    function openModalAndMark(id, e) {
        markRead(id);
        renderTable();
        openModal(e);
    }

    function markReadRow(id) {
        markRead(id);
        renderTable();
        showToast('Marked as read');
    }

    async function deleteRow(id) {
        if (!confirm('Delete this enquiry?')) return;
        const res = await fetch(`/admin/enquiries/${id}`, {
            method: 'DELETE',
            headers: { 'x-admin-password': adminPassword }
        });
        if (res.ok) {
            allEnquiries = allEnquiries.filter(e => e.id !== id);
            updateStats();
            renderTable();
            showToast('Enquiry deleted');
        } else {
            showToast('Delete failed — check server supports DELETE endpoint', true);
        }
    }

    // CSV Export
    document.getElementById('csvBtn').addEventListener('click', () => {
        const rows = activeFilter === 'all' ? allEnquiries : allEnquiries.filter(e => e.type === activeFilter);
        if (!rows.length) { showToast('No data to export', true); return; }

        const escape = v => `"${String(v || '').replace(/"/g, '""')}"`;
        const headers = ['ID','Type','Timestamp','Name/Business','Email/Phone','City','Subject/Quantity','Message'];
        const lines = [headers.join(',')];

        rows.forEach(e => {
            const isD = e.type === 'dealer';
            lines.push([
                escape(e.id),
                escape(e.type),
                escape(e.timestamp),
                escape(isD ? e.business_name : e.from_name),
                escape(isD ? (e.email || e.phone) : e.from_email),
                escape(isD ? e.city : ''),
                escape(isD ? e.order_quantity : e.subject),
                escape(isD ? (e.message || e.flavors) : e.message)
            ].join(','));
        });

        const blob = new Blob([lines.join('\n')], { type:'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `vfc-enquiries-${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast(`✓ Exported ${rows.length} rows`);
    });

    document.getElementById('delAllBtn').addEventListener('click', async () => {
        if (!confirm(`Delete ALL ${allEnquiries.length} enquiries? This cannot be undone.`)) return;
        const res = await fetch('/admin/enquiries/all', {
            method: 'DELETE',
            headers: { 'x-admin-password': adminPassword }
        });
        if (res.ok) {
            allEnquiries = [];
            updateStats();
            renderTable();
            showToast('All enquiries deleted');
        } else {
            showToast('Clear all failed — check server', true);
        }
    });

    // ── Filters & search ───────────────────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.filter;
            renderTable();
        });
    });
    document.getElementById('searchInput').addEventListener('input', renderTable);
    document.getElementById('refreshBtn').addEventListener('click', loadEnquiries);

    // ── Modal ──────────────────────────────────────────────────────────────────
    function openModal(eRaw) {
        const e   = typeof eRaw === 'string' ? JSON.parse(eRaw) : eRaw;
        const isD = e.type === 'dealer';
        const dt  = e.timestamp ? new Date(e.timestamp).toLocaleString('en-IN', { timeZone:'Asia/Kolkata' }) : '—';

        const rows = isD
            ? [['Business',    e.business_name],  ['Contact',  e.contact_person],
               ['Phone',       e.phone],           ['Email',    e.email || 'N/A'],
               ['City',        e.city],            ['Quantity', e.order_quantity],
               ['Flavors',     e.flavors || 'N/A'],['IP',       e.ip || 'N/A']]
            : [['Name',        e.from_name],       ['Email',    e.from_email],
               ['Subject',     e.subject || 'N/A'],['IP',       e.ip || 'N/A']];

        const rowsHTML = rows.map(([l, v]) => `
            <div class="detail-row">
                <div class="detail-label">${l}</div>
                <div class="detail-value">${v}</div>
            </div>`).join('');

        document.getElementById('modalContent').innerHTML = `
            <h3>${isD ? '🏪 Dealer Enquiry' : '📩 Contact Enquiry'}</h3>
            <div class="modal-id">${e.id} &nbsp;·&nbsp; ${dt} IST</div>
            ${rowsHTML}
            <div class="detail-row" style="margin-top:16px;">
                <div class="detail-label">${isD ? 'Notes' : 'Message'}</div>
            </div>
            <div class="detail-message">${isD ? (e.message || '(none)') : e.message}</div>
        `;
        document.getElementById('modalBg').classList.add('open');
    }

    document.getElementById('modalClose').addEventListener('click', () =>
        document.getElementById('modalBg').classList.remove('open'));
    document.getElementById('modalBg').addEventListener('click', e => {
        if (e.target === document.getElementById('modalBg'))
            document.getElementById('modalBg').classList.remove('open');
    });

    // ── Toast ──────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.color = isError ? 'var(--danger)' : 'var(--success)';
        t.style.display = 'block';
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.style.display = 'none', 3000);
    }
</script>
</body>
</html>
